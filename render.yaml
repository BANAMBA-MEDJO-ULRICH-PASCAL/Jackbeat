# ════════════════════════════════════════════════
#  JACKBEAT — Configuration Render.com
#  Infrastructure as Code (IaC)
# ════════════════════════════════════════════════

services:
  # ── Application Web Flask ────────────────────
  - type: web
    name: jackbeat
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:app --workers 2 --threads 2 --timeout 60"
    healthCheckPath: /
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true        # Render génère une clé aléatoire sécurisée
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true        # Render génère un mot de passe aléatoire
      - key: DATABASE_URL
        fromDatabase:
          name: jackbeat-db
          property: connectionString

  # ── Base de données PostgreSQL ───────────────
databases:
  - name: jackbeat-db
    databaseName: jackbeat
    user: jackbeat_user
    plan: free
