<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Jackbeat</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="admin-login-wrap">
  <div class="admin-login-card fade-up">
    <div class="text-center mb-4">
      <div class="jb-brand" style="font-size:2rem;">Jack<em style="font-style:italic;font-weight:400;">beat</em></div>
      <div style="font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-dim);margin-top:0.3rem;">
        Espace Administrateur
      </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert flash-{{ category }} rounded-3 py-2 px-3 mb-3" style="font-size:0.85rem;">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="mb-3">
        <label class="form-label">Identifiant</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--bg-4);border-color:rgba(255,255,255,0.1);color:var(--text-dim);">
            <i class="bi bi-person"></i>
          </span>
          <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Mot de passe</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--bg-4);border-color:rgba(255,255,255,0.1);color:var(--text-dim);">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-jb-gold w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
      </button>
    </form>

    <div class="text-center mt-4">
      <a href="{{ url_for('main_bp.index') }}" style="font-size:0.8rem;color:var(--text-dim);">
        <i class="bi bi-arrow-left me-1"></i>Retour au site
      </a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
